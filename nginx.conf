server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # handle SPA routing
  location / {
    try_files $uri $uri/ /index.html;
  }

  # cache static assets (optional but good for performance)
  location ~* \.(?:css|js|jpg|jpeg|gif|png|svg|ico|woff2?)$ {
    expires 7d;
    add_header Cache-Control "public";
    try_files $uri =404;
  }
}
